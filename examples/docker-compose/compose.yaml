name: valheim

services:
  init-container:
    image: alpine:3.23
    container_name: "init-container"
    user: root
    command:
      - "/bin/sh"
      - "-c"
      - "chown -R 10001:10001 /srv/valheim/saves"
    volumes:
      - type: volume
        source: save_dir
        target: "/srv/valheim/saves"
  valheim-server:
    image: "pfeiffermax/valheim-dedicated-server:latest"
    pull_policy: always
    container_name: "valheim-server"
    command:
      - "-name"
      - "ValheimServer"
      - "-world"
      - "NewWorld"
      - "-password"
      - "supersecret"
      - "-port"
      - "2456"
      - "-public"
      - "0"
      - "-savedir"
      - "/srv/valheim/saves"
    ports:
      - "2456:2456/udp"
      - "2457:2457/udp"
    volumes:
      - type: volume
        source: save_dir
        target: "/srv/valheim/saves"

volumes:
  save_dir:
    name: "valheim-save-dir"
